<!DOCTYPE html>
<html>
    <head>
        <title>Chat with Doctor</title>
    </head>
    <body>
        <h1>Chat with Your Doctor</h1>
        <form action="submit_chat.html" method="post">
            <label for="patient_name">Patient Name:</label><br>
            <input type="text" id="patient_name" name="patient_name" required><br><br>

            <label for="chat_message">Message:</label><br>
            <textarea id="chat_message" name="chat_message" rows="4" cols="50" required></textarea><br><br>

            <input type="submit" value="Start Chat">
        </form>
    </body>
</html>
